<body>

<div class="gridcontainer">
  <div class="header">
<h4>SAMPLE</h4>
<h4>ALUDA STORE</h4>
<br>
<div class="menu-container">

  <label for="menu-toggle" class="menu-icon">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </label>

  <nav class="dropdown-menu">

    <a href="#contact-us">CONTACT US</a>
  </nav>
</div>
</div>
</div>

<div class="gridcontainer">
<div class="checkoutcard">

<h4>CHECKOUT</h4>
<div class="checkouttable">
<table>
  <thead>
    <tr>
      <th>ITEM</th>
      <th>QUANTITY</th>
      <th>PRICE</th>
      <th>TOTAL</th>
      <th>ACTION</th>
    </tr>
  </thead>

  <tbody id="cartTable"></tbody>
</table>
</div>

<div class="ordersummary" id="totalBox">TOTAL : 0</div>

<div class="checkoutbuttons">
  <button class="backbutton" onclick="goBack()">Back</button>
  <button class="confirmbutton" onclick="confirmOrder()">Confirm</button>
